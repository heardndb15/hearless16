services:
  - type: web
    name: hearless-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # --proxy-headers/--forwarded-allow-ips: without these, uvicorn trusts
    # request.client.host as-is, which behind Render's edge proxy is the
    # proxy's own address for every request — the rate limiter's per-IP
    # key_func (get_remote_address) then keys off that single shared address
    # instead of the real client, so all callers effectively share one
    # rate-limit bucket. Render's proxy is a trusted first hop, so honoring
    # its X-Forwarded-For is safe here.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FREEDOMSPEECH_API_KEY
        sync: false
